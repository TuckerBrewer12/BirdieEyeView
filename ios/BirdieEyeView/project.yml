name: BirdieEyeView
defaultConfig: Debug
options:
  minimumXcodeGenVersion: 2.45.0
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 6.0
    PRODUCT_BUNDLE_IDENTIFIER: com.birdieeyeview.ios
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    GENERATE_INFOPLIST_FILE: NO
targets:
  BirdieEyeView:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BirdieEyeView
        excludes:
          - Resources
    resources:
      - path: BirdieEyeView/Resources
        excludes:
          - Info.plist
    info:
      path: BirdieEyeView/Resources/Info.plist
    settings:
      base:
        PRODUCT_NAME: BirdieEyeView
        PRODUCT_BUNDLE_IDENTIFIER: com.birdieeyeview.ios
        INFOPLIST_FILE: BirdieEyeView/Resources/Info.plist
  BirdieEyeViewTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BirdieEyeViewTests
    dependencies:
      - target: BirdieEyeView
