name: Secret Scan

on:
  push:
  pull_request:

jobs:
  detect-secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run repo secret boundary checks
        run: bash scripts/security/scan_secrets.sh
